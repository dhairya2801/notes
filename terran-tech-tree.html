<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StarCraft II Terran Tech Tree</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/vis-network/styles/vis-network.min.css"
  />
  <style>
    :root {
      --bg-a: #e7eef2;
      --bg-b: #f6efe6;
      --panel: rgba(255, 255, 255, 0.88);
      --panel-strong: rgba(255, 255, 255, 0.96);
      --ink: #17232f;
      --muted: #587082;
      --line: #c7d4de;
      --accent: #d46a1f;
      --accent-dark: #9e4a16;
    }

    html,
    body {
      height: 100%;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "IBM Plex Sans", "Trebuchet MS", sans-serif;
      color: var(--ink);
      overflow: hidden;
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.75), transparent 34%),
        linear-gradient(135deg, var(--bg-a), var(--bg-b));
    }

    .app {
      height: 100vh;
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(0, 3fr) minmax(320px, 1fr);
    }

    .canvas-pane {
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-height: 0;
    }

    .canvas-card,
    .info-pane {
      border: 1px solid rgba(79, 104, 122, 0.2);
      backdrop-filter: blur(10px);
      box-shadow: 0 18px 40px rgba(34, 55, 77, 0.08);
    }

    .canvas-card {
      background: var(--panel);
      border-radius: 22px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: calc(100vh - 36px);
      min-height: 0;
    }

    .canvas-header {
      padding: 16px 20px 12px;
      border-bottom: 1px solid rgba(79, 104, 122, 0.14);
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 16px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.84), rgba(235, 243, 248, 0.86));
    }

    .canvas-title {
      margin: 0;
      font-size: 1.45rem;
      line-height: 1.1;
      letter-spacing: 0.02em;
    }

    .canvas-subtitle {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .canvas-badge {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(212, 106, 31, 0.12);
      color: var(--accent-dark);
      font-size: 0.82rem;
      font-weight: 700;
      white-space: nowrap;
    }

    #network {
      flex: 1 1 auto;
      min-height: 0;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.28), rgba(235, 241, 245, 0.45)),
        linear-gradient(90deg, rgba(90, 117, 137, 0.05) 1px, transparent 1px),
        linear-gradient(rgba(90, 117, 137, 0.05) 1px, transparent 1px);
      background-size: auto, 48px 48px, 48px 48px;
    }

    .info-pane {
      background: var(--panel-strong);
      border-left: 1px solid rgba(79, 104, 122, 0.22);
      padding: 22px 20px 28px;
      height: 100vh;
      overflow-y: auto;
    }

    .info-kicker {
      margin: 0 0 8px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 0.73rem;
      color: var(--accent-dark);
      font-weight: 800;
    }

    .info-title {
      margin: 0;
      font-size: 1.5rem;
      line-height: 1.1;
    }

    .info-lead {
      margin: 10px 0 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .section {
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid rgba(79, 104, 122, 0.14);
    }

    .section h3 {
      margin: 0 0 10px;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #355065;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .stat-card {
      padding: 12px 10px;
      border-radius: 14px;
      background: #f4f7fa;
      border: 1px solid rgba(79, 104, 122, 0.14);
      text-align: center;
    }

    .stat-card strong {
      display: block;
      font-size: 1.1rem;
      color: #183042;
    }

    .stat-card span {
      display: block;
      margin-top: 4px;
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .tag-list,
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag,
    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 999px;
      background: #f3f6f8;
      border: 1px solid rgba(79, 104, 122, 0.14);
      color: #294257;
      font-size: 0.88rem;
      line-height: 1.2;
    }

    .swatch {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      border: 1px solid rgba(0, 0, 0, 0.15);
      flex: 0 0 auto;
    }

    .meta {
      margin-top: 8px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(24, 48, 66, 0.08);
      color: #284257;
      font-size: 0.85rem;
      font-weight: 700;
    }

    .relationship-card {
      margin-top: 18px;
      padding: 16px;
      border-radius: 18px;
      background: linear-gradient(180deg, #f9fbfc, #eef4f8);
      border: 1px solid rgba(79, 104, 122, 0.14);
    }

    .relationship-card p {
      margin: 8px 0 0;
      color: var(--muted);
      line-height: 1.5;
    }

    @media (max-width: 980px) {
      body {
        overflow: auto;
      }

      .app {
        height: auto;
        grid-template-columns: 1fr;
      }

      .canvas-card {
        height: auto;
        min-height: 64vh;
      }

      #network {
        min-height: 64vh;
      }

      .info-pane {
        height: auto;
        border-left: 0;
        border-top: 1px solid rgba(79, 104, 122, 0.22);
      }
    }
  </style>
</head>

    <aside class="info-pane" id="info-panel"></aside>

    const groupStyles = {
      resource: {
        shape: "diamond",
        color: { background: "#f4c36a", border: "#c38f24", highlight: { background: "#ffd785", border: "#8e6310" } }
      },
      worker: {
        shape: "ellipse",
        color: { background: "#87c26b", border: "#4d8b38", highlight: { background: "#9fd882", border: "#36681f" } }
      },
      tier1: {
        shape: "box",
        color: { background: "#7ca8cc", border: "#416b8c", highlight: { background: "#99c1e2", border: "#244b69" } }
      },
      tier15: {
        shape: "box",
        color: { background: "#e7a46f", border: "#a95f25", highlight: { background: "#f0b580", border: "#7d4418" } }
      },
      addon: {
        shape: "hexagon",
        color: { background: "#a7d5cd", border: "#49857c", highlight: { background: "#bde6df", border: "#2f645c" } }
      },
      tier2: {
        shape: "box",
        color: { background: "#c97a7c", border: "#8d4145", highlight: { background: "#d99496", border: "#6b2529" } }
      },
      tier25: {
        shape: "box",
        color: { background: "#b18ea5", border: "#744f69", highlight: { background: "#c1a2b6", border: "#533449" } }
      },
      tier3: {
        shape: "box",
        color: { background: "#75b9be", border: "#35747a", highlight: { background: "#90d0d4", border: "#1d5960" } }
      },
      tier35: {
        shape: "box",
        color: { background: "#8f98b3", border: "#55607b", highlight: { background: "#a7b1c9", border: "#36405c" } }
      }
    };

    const edgeStyles = {
      Produces: { color: "#2f7d4a", width: 2.6 },
      Unlocks: { color: "#2f6ea0", width: 2.4 },
      Requires: { color: "#6b7c8c", width: 2.2, dashes: true },
      Harvests: { color: "#b87a17", width: 2.4, dashes: [6, 4] },
      Provides: { color: "#5f4db6", width: 2.4, dashes: [2, 5] },
      Builds: { color: "#8d5a2d", width: 2.2 },
      "Requires Tech Lab": { color: "#7c4bc7", width: 2.4, dashes: [8, 5] },
      "Supports Add-on": { color: "#19828b", width: 2.1, dashes: [3, 4] }
    };

    const groupLabels = {
      resource: "Resource",
      worker: "Worker",
      tier1: "Tier 1",
      tier15: "Tier 1.5",
      tier2: "Tier 2",
      tier25: "Tier 2.5",
      tier3: "Tier 3",
      tier35: "Tier 3.5",
      addon: "Add-on"
    };

    const infoPanel = document.getElementById("info-panel");

    const nameToId = Object.fromEntries(rawNodes.map((node, index) => [node.name, index + 1]));
    const nodesById = Object.fromEntries(rawNodes.map((node, index) => [index + 1, node]));

    const visNodes = new vis.DataSet(
      rawNodes.map((node, index) => ({
        id: index + 1,
        label: node.label,
        group: node.group,
        x: node.x,
        y: node.y,
        title: node.name,
        physics: false,
        fixed: {
          x: true,
          y: true
        },
        font: {
          color: "#10212d",
          face: "IBM Plex Sans, Trebuchet MS, sans-serif",
          size: 16,
          bold: {
            color: "#10212d",
            face: "IBM Plex Sans, Trebuchet MS, sans-serif",
            size: 16
          }
        },
        margin: 14
      }))
    );

    const visEdges = new vis.DataSet(
      rawRelations.map((relation, index) => {
        const style = edgeStyles[relation.type] || { color: "#6b7c8c", width: 2 };
        return {
          id: index + 1,
          from: nameToId[relation.fromName],
          to: nameToId[relation.toName],
          arrows: "to",
          color: { color: style.color, highlight: style.color, hover: style.color },
          width: style.width,
          dashes: style.dashes || false,
          title: relation.type + ": " + relation.description,
          relationType: relation.type,
          description: relation.description,
          fromName: relation.fromName,
          toName: relation.toName,
          smooth: false
        };
      })
    );

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function formatCostValue(value) {
      return value === null || value === undefined ? "N/A" : String(value);
    }

    function renderTags(items) {
      return '<div class="tag-list">' + items.map((item) => '<span class="tag">' + escapeHtml(item) + "</span>").join("") + "</div>";
    }

    function renderSection(title, items) {
      if (!items || !items.length) {
        return "";
      }
      return '<section class="section"><h3>' + escapeHtml(title) + "</h3>" + renderTags(items) + "</section>";
    }

    function renderLegend() {
      const legendItems = [
        ["resource", "Resource"],
        ["worker", "Worker"],
        ["tier1", "Tier 1"],
        ["tier15", "Tier 1.5"],
        ["tier2", "Tier 2"],
        ["tier25", "Tier 2.5"],
        ["tier3", "Tier 3"],
        ["tier35", "Tier 3.5"],
        ["addon", "Add-on"]
      ];

      return (
        '<section class="section"><h3>Legend</h3><div class="legend">' +
        legendItems
          .map(([group, label]) => {
            const swatch = groupStyles[group].color.background;
            return '<span class="legend-item"><span class="swatch" style="background:' + swatch + ';"></span>' + escapeHtml(label) + "</span>";
          })
          .join("") +
        "</div></section>"
      );
    }

    function renderDefaultPanel() {
      infoPanel.innerHTML = [
        '<p class="info-kicker">Info Panel</p>',
        '<h2 class="info-title">Terran Production Map</h2>',
        '<p class="info-lead">Select a node to inspect its description, costs, requirements, and outputs. Select an edge to read the exact relationship between two tech nodes.</p>',
        '<div class="meta">Tip: scroll to zoom, drag the canvas to pan, drag nodes to rearrange.</div>',
        renderLegend(),
        '<section class="section"><h3>Scope</h3><p class="info-lead">This map uses only the supplied Terran units, structures, resources, and add-ons. Upgrade targets named in the sidebar, such as Orbital Command or Planetary Fortress, are preserved in the node details even when they are not separate graph nodes.</p></section>'
      ].join("");
    }

    function renderNodePanel(node) {
      const details = node.details || {};
      const cost = details.cost || {};
      const sectionHtml = [
        renderSection("Requires", details.requires),
        renderSection("Produces", details.produces),
        renderSection("Unlocks", details.unlocks),
        renderSection("Upgrades To", details.upgradesTo),
        renderSection("Provides", details.provides),
        renderSection("Builds", details.builds),
        renderSection("Harvests", details.harvests),
        renderSection("Attaches To", details.attachesTo),
        renderSection("Effect", details.effect),
        renderSection("Used For", details.usedFor),
        renderSection("Provided By", details.providedBy),
        renderSection("Add-ons", details.addOns)
      ].join("");

      infoPanel.innerHTML = [
        '<p class="info-kicker">Node</p>',
        '<h2 class="info-title">' + escapeHtml(node.name) + "</h2>",
        '<div class="meta">' + escapeHtml(groupLabels[node.group] || node.group) + "</div>",
        '<p class="info-lead">' + escapeHtml(details.description || "No description provided.") + "</p>",
        '<section class="section"><h3>Costs</h3>',
        '<div class="stats">',
        '<div class="stat-card"><strong>' + formatCostValue(cost.minerals) + '</strong><span>Minerals</span></div>',
        '<div class="stat-card"><strong>' + formatCostValue(cost.gas) + '</strong><span>Gas</span></div>',
        '<div class="stat-card"><strong>' + formatCostValue(cost.supply) + '</strong><span>Supply</span></div>',
        "</div></section>",
        sectionHtml
      ].join("");
    }

    function renderEdgePanel(edge) {
      infoPanel.innerHTML = [
        '<p class="info-kicker">Relationship</p>',
        '<h2 class="info-title">' + escapeHtml(edge.relationType) + "</h2>",
        '<div class="relationship-card">',
        '<strong>' + escapeHtml(edge.fromName) + " -> " + escapeHtml(edge.toName) + "</strong>",
        '<p>' + escapeHtml(edge.description) + "</p>",
        "</div>",
        '<section class="section"><h3>Interpretation</h3><p class="info-lead">This arrow shows how the source node contributes to, unlocks, produces, or enables the target node inside the Terran tech tree.</p></section>'
      ].join("");
    }

    renderDefaultPanel();

    const container = document.getElementById("network");
    const data = { nodes: visNodes, edges: visEdges };
    const options = {
      autoResize: true,
      physics: false,
      groups: groupStyles,
      nodes: {
        borderWidth: 2,
        borderWidthSelected: 3,
        shadow: {
          enabled: true,
          color: "rgba(23, 35, 47, 0.18)",
          size: 16,
          x: 0,
          y: 8
        }
      },
      edges: {
        arrows: {
          to: {
            enabled: true,
            scaleFactor: 0.78
          }
        },
        selectionWidth: 4,
        hoverWidth: 3,
        smooth: false
      },
      interaction: {
        dragNodes: true,
        dragView: true,
        zoomView: true,
        hover: true,
        navigationButtons: true,
        keyboard: true,
        tooltipDelay: 100
      }
    };

    const network = new vis.Network(container, data, options);

    window.setTimeout(function () {
      network.fit({ animation: false });
    }, 80);

    network.on("click", function (params) {
      if (params.nodes.length) {
        renderNodePanel(nodesById[params.nodes[0]]);
        return;
      }

      if (params.edges.length) {
        renderEdgePanel(visEdges.get(params.edges[0]));
        return;
      }

      renderDefaultPanel();
    });
  </script>
