<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StarCraft II Protoss Tech Tree</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/vis-network/styles/vis-network.min.css"
  />
  <style>
    :root {
      --bg-1: #0d1320;
      --bg-2: #161d2b;
      --panel: rgba(16, 22, 35, 0.72);
      --panel-strong: rgba(18, 25, 39, 0.86);
      --line: rgba(255, 255, 255, 0.1);
      --text: #f4f7fb;
      --muted: #a5b0c4;
      --accent: #d2a958;
      --accent-soft: rgba(210, 169, 88, 0.18);
      --accent-2: #74b7ff;
      --accent-2-soft: rgba(116, 183, 255, 0.16);
      --shadow: rgba(0, 0, 0, 0.36);
    }

    html,
    body {
      height: 100%;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      color: var(--text);
      overflow: hidden;
      background:
        radial-gradient(circle at 15% 20%, var(--accent-soft), transparent 18%),
        radial-gradient(circle at 82% 18%, var(--accent-2-soft), transparent 16%),
        radial-gradient(circle at 70% 82%, rgba(126, 86, 184, 0.14), transparent 18%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    body::before {
      background:
        radial-gradient(circle at 12% 24%, rgba(255, 255, 255, 0.24) 0 1px, transparent 1.2px),
        radial-gradient(circle at 32% 62%, rgba(255, 255, 255, 0.18) 0 1px, transparent 1.2px),
        radial-gradient(circle at 74% 34%, rgba(255, 255, 255, 0.2) 0 1px, transparent 1.2px),
        radial-gradient(circle at 88% 72%, rgba(255, 255, 255, 0.18) 0 1px, transparent 1.2px),
        radial-gradient(circle at 60% 88%, rgba(255, 255, 255, 0.16) 0 1px, transparent 1.2px);
      opacity: 0.65;
      background-size: 360px 360px;
      animation: drift 20s linear infinite;
    }

    body::after {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0));
      mix-blend-mode: screen;
    }

    @keyframes drift {
      from {
        transform: translate3d(0, 0, 0);
      }

      to {
        transform: translate3d(-24px, 18px, 0);
      }
    }

    .app {
      position: relative;
      z-index: 1;
      width: min(1240px, calc(100% - 32px));
      height: calc(100vh - 48px);
      min-height: calc(100vh - 48px);
      margin: 24px auto;
      padding: 28px;
      border-radius: 32px;
      background: linear-gradient(180deg, rgba(20, 27, 42, 0.72), rgba(13, 18, 29, 0.78));
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 24px 60px var(--shadow);
      backdrop-filter: blur(18px);
      display: grid;
      grid-template-columns: minmax(0, 3fr) minmax(320px, 1fr);
      gap: 22px;
    }

    .canvas-pane {
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 0;
      min-height: 0;
    }

    .canvas-card,
    .info-pane {
      position: relative;
      overflow: hidden;
      border-radius: 28px;
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.2);
    }

    .canvas-card {
      display: flex;
      flex-direction: column;
      height: 100%;
      min-height: 0;
    }

    .canvas-header {
      padding: 18px 22px 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 16px;
      background:
        radial-gradient(circle at top right, rgba(255, 255, 255, 0.08), transparent 24%),
        linear-gradient(160deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.02)),
        var(--panel);
    }

    .canvas-title {
      margin: 0;
      font-size: 1.55rem;
      line-height: 1.1;
      letter-spacing: 0.02em;
      color: var(--text);
    }

    .canvas-subtitle {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
      max-width: 52ch;
    }

    .canvas-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .header-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 16px;
      padding: 10px 14px;
      text-decoration: none;
      font-weight: 600;
      color: var(--text);
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .canvas-badge {
      padding: 10px 14px;
      border-radius: 999px;
      background: var(--accent-soft);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--accent-2);
      font-size: 0.8rem;
      font-weight: 700;
      white-space: nowrap;
    }

    #network {
      flex: 1 1 auto;
      min-height: 0;
      background:
        radial-gradient(circle at 16% 18%, rgba(210, 169, 88, 0.08), transparent 18%),
        radial-gradient(circle at 84% 78%, rgba(116, 183, 255, 0.08), transparent 22%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(246, 249, 253, 0.98)),
        linear-gradient(90deg, rgba(162, 177, 205, 0.08) 1px, transparent 1px),
        linear-gradient(rgba(162, 177, 205, 0.08) 1px, transparent 1px);
      background-size: auto, auto, auto, 48px 48px, 48px 48px;
    }

    .info-pane {
      background: var(--panel-strong);
      border-left: 1px solid rgba(255, 255, 255, 0.08);
      padding: 22px 20px 28px;
      height: 100%;
      overflow-y: auto;
    }

    .info-kicker {
      margin: 0 0 8px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 0.73rem;
      color: var(--accent-2);
      font-weight: 800;
    }

    .info-title {
      margin: 0;
      font-size: 1.5rem;
      line-height: 1.1;
      color: var(--text);
    }

    .info-lead {
      margin: 10px 0 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .section {
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .section h3 {
      margin: 0 0 10px;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .stat-card {
      padding: 12px 10px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      text-align: center;
    }

    .stat-card strong {
      display: block;
      font-size: 1.1rem;
      color: var(--accent-2);
    }

    .stat-card span {
      display: block;
      margin-top: 4px;
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .tag-list,
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag,
    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #dce6f5;
      font-size: 0.88rem;
      line-height: 1.2;
    }

    .swatch {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      border: 1px solid rgba(0, 0, 0, 0.15);
      flex: 0 0 auto;
    }

    .meta {
      margin-top: 8px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-radius: 999px;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.03));
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #dce6f5;
      font-size: 0.85rem;
      font-weight: 700;
    }

    .relationship-card {
      margin-top: 18px;
      padding: 16px;
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.03)),
        rgba(8, 12, 20, 0.24);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .relationship-card p {
      margin: 8px 0 0;
      color: var(--muted);
      line-height: 1.5;
    }

    @media (max-width: 980px) {
      body {
        overflow: auto;
      }

      .app {
        width: min(100% - 20px, 1240px);
        height: auto;
        min-height: 0;
        margin: 10px auto;
        padding: 18px;
        height: auto;
        grid-template-columns: 1fr;
      }

      .canvas-card {
        height: auto;
        min-height: 64vh;
      }

      #network {
        min-height: 64vh;
      }

      .info-pane {
        height: auto;
        border-left: 0;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
      }

      .canvas-actions {
        justify-content: flex-start;
      }
    }
  </style>
</head>

            <div class="canvas-badge">Vis Network</div>

        <div id="network"></div>

    </main>

    <aside class="info-pane" id="info-panel"></aside>
  </div>

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function formatCostValue(value) {

    function renderSection(title, items) {
      if (!items || !items.length) {
        return "";
      }
      return '<section class="section"><h3>' + escapeHtml(title) + "</h3>" + renderTags(items) + "</section>";
    }

        ["tier2", "Tier 2"],

        ["tier3", "Tier 3"]
      ];

      return (
        '<section class="section"><h3>Legend</h3><div class="legend">' +
        legendItems
          .map(([group, label]) => {
            const swatch = groupStyles[group].color.background;
            return '<span class="legend-item"><span class="swatch" style="background:' + swatch + ';"></span>' + escapeHtml(label) + "</span>";
          })
          .join("") +
        "</div></section>"
      );
    }

        renderSection("Provides", details.provides),
        renderSection("Radiates", details.radiates),
        renderSection("Recharges", details.recharges),
        renderSection("Harvests", details.harvests),
        renderSection("Abilities", details.abilities),
        renderSection("Required For", details.requiredFor),
        renderSection("Used For", details.usedFor),
        renderSection("Provided By", details.providedBy),
        renderSection("Possessed By", details.possessedBy)
      ].join("");

      infoPanel.innerHTML = [
        '<p class="info-kicker">Node</p>',
        '<h2 class="info-title">' + escapeHtml(node.name) + "</h2>",
        '<div class="meta">' + escapeHtml(groupLabels[node.group] || node.group) + "</div>",
        '<p class="info-lead">' + escapeHtml(details.description || "No description provided.") + "</p>",
        '<section class="section"><h3>Costs</h3>',
        '<div class="stats">',
        '<div class="stat-card"><strong>' + formatCostValue(cost.minerals) + '</strong><span>Minerals</span></div>',
        '<div class="stat-card"><strong>' + formatCostValue(cost.gas) + '</strong><span>Gas</span></div>',
        '<div class="stat-card"><strong>' + formatCostValue(cost.supply) + '</strong><span>Supply</span></div>',
        "</div></section>",
        sectionHtml
      ].join("");
    }

    function renderEdgePanel(edge) {
      infoPanel.innerHTML = [
        '<p class="info-kicker">Relationship</p>',
        '<h2 class="info-title">' + escapeHtml(edge.relationType) + "</h2>",
        '<div class="relationship-card">',
        '<strong>' + escapeHtml(edge.fromName) + " -> " + escapeHtml(edge.toName) + "</strong>",
        '<p>' + escapeHtml(edge.description) + "</p>",
        "</div>",
        '<section class="section"><h3>Interpretation</h3><p class="info-lead">This arrow shows how the source node enables, powers, produces, recharges, warps in, or morphs into the target node inside the Protoss tech tree.</p></section>'
      ].join("");
    }

    renderDefaultPanel();

    const container = document.getElementById("network");
    const data = { nodes: visNodes, edges: visEdges };
    const options = {
      autoResize: true,
      physics: false,
      groups: groupStyles,
      nodes: {
        borderWidth: 2,
        borderWidthSelected: 3,
        shadow: {
          enabled: true,
          color: "rgba(25, 35, 56, 0.18)",
          size: 16,
          x: 0,
          y: 8
        }
      },
      edges: {
        arrows: {
          to: {
            enabled: true,
            scaleFactor: 0.78
          }
        },
        selectionWidth: 4,
        hoverWidth: 3,
        smooth: false
      },
      interaction: {
        dragNodes: true,
        dragView: true,
        zoomView: true,
        hover: true,
        navigationButtons: true,
        keyboard: true,
        tooltipDelay: 100
      }
    };

    const network = new vis.Network(container, data, options);

    window.setTimeout(function () {
      network.fit({ animation: false });
    }, 80);

    network.on("click", function (params) {
      if (params.nodes.length) {
        renderNodePanel(nodesById[params.nodes[0]]);
        return;
      }

      if (params.edges.length) {
        renderEdgePanel(visEdges.get(params.edges[0]));
        return;
      }

      renderDefaultPanel();
    });
  </script>
</body>
</html>
